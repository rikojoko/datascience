<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Medis Flask</title>
    <!-- Menggunakan Bootstrap CSS untuk tampilan instan yang rapi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/url/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 700px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h3 class="mb-0">🏥 Asisten Medis Multitask (Flask)</h3>
                <p class="mb-0 text-white-50 small">Aplikasi Web Berbasis Jinja2 Template</p>
            </div>
            <div class="card-body p-4">
                
                <!-- Form Input Pasien -->
                <form action="/diagnosa" method="POST">
                    <div class="mb-3">
                        <label for="symptom" class="form-label fw-bold">1. Keluhan / Gejala Klinis</label>
                        <textarea class="form-control" id="symptom" name="symptom" rows="3" placeholder="Contoh: Sakit perut hebat dan diare berkali-kali..." required>{{ input_symptom }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="usia" class="form-label fw-bold">2. Usia (Tahun)</label>
                            <input type="number" class="form-control" id="usia" name="usia" value="{{ input_usia if input_usia else 25 }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="tekanan_darah" class="form-label fw-bold">3. Tensi (Sistolik/Diastolik)</label>
                            <input type="text" class="form-control" id="tekanan_darah" name="tekanan_darah" value="{{ input_td if input_td else '120/80' }}" placeholder="120/80" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="kadar_gula" class="form-label fw-bold">4. Gula Darah (mg/dL)</label>
                            <input type="number" class="form-control" id="kadar_gula" name="kadar_gula" value="{{ input_gula if input_gula else 100 }}" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary btn-lg">Mulai Analisis Medis</button>
                    </div>
                </form>

                <!-- Menampilkan Hasil Jika Variabel 'hasil' Dikirim dari Python -->
                {% if hasil %}
                <div class="mt-4 p-3 bg-white border rounded shadow-sm">
                    <h4 class="text-success border-bottom pb-2">📊 Hasil Prediksi Model Multitask</h4>
                    
                    <div class="mb-3">
                        <small class="text-muted d-block">Task 1: Hasil Diagnosa</small>
                        <span class="badge bg-danger fs-6 py-2 px-3 mt-1">{{ hasil.task_1_diagnosis }}</span>
                    </div>

                    <div>
                        <small class="text-muted d-block">Task 2: Rekomendasi Terapi</small>
                        <div class="alert alert-info mt-1 py-2" role="alert">
                            {{ hasil.task_2_therapy }}
                        </div>
                    </div>
                </div>
                {% endif %}

                <!-- Menampilkan Pesan Eror Jika Terjadi Masalah -->
                {% if error %}
                <div class="alert alert-danger mt-4" role="alert">
                    ❌ <strong>Kesalahan:</strong> {{ error }}
                </div>
                {% endif %}

            </div>
        </div>
    </div>

</body>
</html>
